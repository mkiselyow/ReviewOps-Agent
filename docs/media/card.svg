<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 592 380" role="img" aria-labelledby="t d" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <title id="t">ReviewOps Agent — card</title>
  <desc id="d">Kaggle card: ReviewOps Agent, permission-aware evidence-grounded performance reviews. Access control runs in code before the model. Built with Google ADK 2.0 and Gemini.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0d1730"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#8aa0c4"/></marker>
    <style>
      .kick{fill:#f4b740;font-weight:700;font-size:11px;letter-spacing:1.8px}
      .h1{fill:#f2f6fc;font-weight:800;font-size:44px}
      .tag{fill:#c3d1ea;font-size:15.5px}
      .nl{fill:#e7eef9;font-weight:700;font-size:12px}
      .sm{fill:#9fb0cc;font-size:9.5px}
      .foot{fill:#7f90ad;font-size:10.5px}
    </style>
  </defs>

  <rect width="592" height="380" fill="url(#bg)"/>
  <rect x="0" y="0" width="592" height="4" fill="#f4b740"/>

  <text x="36" y="64" class="kick">KAGGLE · AI AGENTS INTENSIVE — AGENTS FOR BUSINESS</text>
  <text x="34" y="118" class="h1">ReviewOps Agent</text>
  <text x="36" y="150" class="tag">Permission-aware, evidence-grounded performance reviews.</text>

  <!-- thesis ribbon -->
  <rect x="36" y="192" width="106" height="64" rx="10" fill="#16223c" stroke="#2c3e60" stroke-width="1.3"/>
  <text x="89" y="219" text-anchor="middle" class="nl">Browser</text>
  <text x="89" y="237" text-anchor="middle" class="sm">manager · employee</text>
  <line x1="142" y1="224" x2="166" y2="224" stroke="#8aa0c4" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="169" y="186" width="136" height="76" rx="10" fill="#0f1a30" stroke="#f4b740" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="237" y="211" text-anchor="middle" class="nl" fill="#f6d488">Next.js · TypeScript</text>
  <text x="237" y="229" text-anchor="middle" class="sm">🔒 Auth · RBAC · PII redaction</text>
  <text x="237" y="246" text-anchor="middle" class="sm">consent gate · audit</text>
  <line x1="305" y1="224" x2="329" y2="224" stroke="#f4b740" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="332" y="186" width="128" height="76" rx="10" fill="#0f1a30" stroke="#5b9bff" stroke-width="1.6"/>
  <text x="396" y="211" text-anchor="middle" class="nl" fill="#bcd3ff">Python ADK 2.0</text>
  <text x="396" y="229" text-anchor="middle" class="sm">3 graph Workflows</text>
  <text x="396" y="246" text-anchor="middle" class="sm">Cloud Run</text>
  <line x1="460" y1="224" x2="484" y2="224" stroke="#8aa0c4" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="487" y="192" width="72" height="64" rx="10" fill="#1a1730" stroke="#b98bff" stroke-width="1.5"/>
  <text x="523" y="219" text-anchor="middle" class="nl" fill="#e6d9ff">Gemini</text>
  <text x="523" y="237" text-anchor="middle" class="sm">Vertex AI</text>

  <text x="36" y="292" class="sm" font-size="11">The LLM is never the authorization boundary — access control runs in code, <tspan fill="#f4b740" font-weight="700">before</tspan> the model.</text>

  <line x1="36" y1="322" x2="556" y2="322" stroke="#1c2b47" stroke-width="1"/>
  <text x="36" y="348" class="foot">Google ADK 2.0 · Gemini · Cloud Run · Vercel · Turso</text>
  <text x="556" y="348" text-anchor="end" class="foot" fill="#8fb6ff">reviewops-agent.vercel.app</text>
</svg>
