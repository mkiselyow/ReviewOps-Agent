<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 640" role="img" aria-labelledby="t d" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <title id="t">ReviewOps Agent — end-to-end activity lifecycle</title>
  <desc id="d">Three phases. Collect and send: manager describes a topic, the questionnaire agent generates, the safety agent reviews, the manager approves (or refines and regenerates), personal token links land in the outbox. Evidence with quality gates: the employee answers, a security node redacts PII, the evidence validator scores and maps, confidence at least 0.7 auto-approves, otherwise follow-up prompts and the manager queue with an improve-and-resubmit loop; standalone Add evidence reuses the same path. Grounded review and export: manager opens results, a privacy node builds consent-gated minimized context, the review draft agent cites evidence ids, a fairness node checks grounding, the manager approves or edits, then Markdown export plus audit log.</desc>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="8" refX="7.5" refY="3" orient="auto"><path d="M0 0 L7.5 3 L0 6 Z" fill="#8aa0c4"/></marker>
    <marker id="aw" markerWidth="9" markerHeight="8" refX="7.5" refY="3" orient="auto"><path d="M0 0 L7.5 3 L0 6 Z" fill="#f4b740"/></marker>
    <style>
      .t{fill:#f2f6fc;font-weight:800;font-size:26px}
      .sub{fill:#9fb0cc;font-size:14px}
      .lane{font-weight:700;font-size:13px}
      .nl{fill:#e7eef9;font-weight:600;font-size:12.5px}
      .sm{fill:#9fb0cc;font-size:10.5px}
      .ll{fill:#f4b740;font-size:11px}
      .band{fill:#0e1830;stroke:#1c2b47;stroke-width:1}
      .human{fill:#16223c;stroke:#f4b740;stroke-width:1.6}
      .agent{fill:#16223c;stroke:#5b9bff;stroke-width:1.5}
      .det{fill:#0f1a30;stroke:#3a4a66;stroke-width:1.5}
      .ok{fill:#12233d;stroke:#34d399;stroke-width:1.5}
      .warn{fill:#2a2412;stroke:#f4b740;stroke-width:1.5}
      .dia{fill:#1b2136;stroke:#f4b740;stroke-width:1.5}
      .flow{stroke:#8aa0c4;stroke-width:1.4;fill:none}
      .loop{stroke:#f4b740;stroke-width:1.3;fill:none;stroke-dasharray:5 4}
    </style>
  </defs>
  <rect width="1240" height="640" fill="#0b1220"/>
  <text x="40" y="44" class="t">End-to-end lifecycle</text>
  <text x="40" y="70" class="sub">One business workflow, three phases — every model call sits behind RBAC, consent, and PII filtering; every phase ends at a human gate.</text>

  <!-- ============ Lane 1: Collect & send ============ -->
  <rect x="28" y="92" width="1184" height="128" rx="12" class="band"/>
  <text x="44" y="116" class="lane" fill="#8fb6ff">1 · Collect &amp; send</text>

  <rect x="44" y="140" width="150" height="52" rx="26" class="human"/>
  <text x="119" y="162" text-anchor="middle" class="nl">Manager describes</text>
  <text x="119" y="178" text-anchor="middle" class="sm">topic · period · notes</text>

  <rect x="224" y="140" width="170" height="52" rx="9" class="agent"/>
  <text x="309" y="162" text-anchor="middle" class="nl">questionnaire_agent</text>
  <text x="309" y="178" text-anchor="middle" class="sm">plan → deterministic expand</text>

  <rect x="424" y="140" width="130" height="52" rx="9" class="agent"/>
  <text x="489" y="162" text-anchor="middle" class="nl">safety_agent</text>
  <text x="489" y="178" text-anchor="middle" class="sm">verdict only</text>

  <polygon points="584,166 640,138 696,166 640,194" class="dia"/>
  <text x="640" y="170" text-anchor="middle" class="nl" font-size="11.5">approve?</text>

  <rect x="726" y="140" width="200" height="52" rx="9" class="det"/>
  <text x="826" y="162" text-anchor="middle" class="nl">personal token links</text>
  <text x="826" y="178" text-anchor="middle" class="sm">→ mock outbox · deadline · reminders</text>

  <line x1="194" y1="166" x2="222" y2="166" class="flow" marker-end="url(#a)"/>
  <line x1="394" y1="166" x2="422" y2="166" class="flow" marker-end="url(#a)"/>
  <line x1="554" y1="166" x2="582" y2="166" class="flow" marker-end="url(#a)"/>
  <line x1="696" y1="166" x2="724" y2="166" class="flow" marker-end="url(#a)"/>
  <text x="706" y="158" class="sm" fill="#7ee0b8">yes</text>
  <path d="M640 138 L640 116 L309 116 L309 136" class="loop" marker-end="url(#aw)"/>
  <text x="404" y="111" class="ll">no — refine &amp; regenerate (feedback accumulates)</text>

  <line x1="926" y1="166" x2="1136" y2="166" class="flow" marker-end="url(#a)"/>
  <circle cx="1160" cy="166" r="14" fill="#0f1a30" stroke="#7ee0b8" stroke-width="1.5"/>
  <text x="1160" y="171" text-anchor="middle" class="nl" fill="#7ee0b8">2</text>

  <!-- ============ Lane 2: Evidence ============ -->
  <rect x="28" y="236" width="1184" height="150" rx="12" class="band"/>
  <text x="44" y="260" class="lane" fill="#7ee0b8">2 · Evidence with quality gates</text>

  <rect x="44" y="288" width="170" height="52" rx="26" class="human"/>
  <text x="129" y="310" text-anchor="middle" class="nl">Employee opens link</text>
  <text x="129" y="326" text-anchor="middle" class="sm">answers · consent checkbox</text>

  <rect x="244" y="288" width="150" height="52" rx="9" class="det"/>
  <text x="319" y="310" text-anchor="middle" class="nl">security_node</text>
  <text x="319" y="326" text-anchor="middle" class="sm">PII redaction</text>

  <rect x="424" y="288" width="170" height="52" rx="9" class="agent"/>
  <text x="509" y="310" text-anchor="middle" class="nl">evidence_validator</text>
  <text x="509" y="326" text-anchor="middle" class="sm">score · map · concern</text>

  <polygon points="624,314 682,286 740,314 682,342" class="dia"/>
  <text x="682" y="318" text-anchor="middle" class="nl" font-size="11.5">conf ≥ 0.7?</text>

  <rect x="772" y="266" width="150" height="44" rx="9" class="ok"/>
  <text x="847" y="293" text-anchor="middle" class="nl">auto-approved</text>

  <rect x="772" y="322" width="190" height="44" rx="9" class="warn"/>
  <text x="867" y="340" text-anchor="middle" class="nl">follow-up · manager queue</text>
  <text x="867" y="356" text-anchor="middle" class="sm">weak evidence never stored silently</text>

  <line x1="214" y1="314" x2="242" y2="314" class="flow" marker-end="url(#a)"/>
  <line x1="394" y1="314" x2="422" y2="314" class="flow" marker-end="url(#a)"/>
  <line x1="594" y1="314" x2="622" y2="314" class="flow" marker-end="url(#a)"/>
  <path d="M714 298 L744 288 L770 288" class="flow" stroke="#34d399" marker-end="url(#a)"/>
  <text x="742" y="280" class="sm" fill="#7ee0b8">yes</text>
  <path d="M714 330 L744 344 L770 344" class="flow" stroke="#f4b740" marker-end="url(#a)"/>
  <text x="742" y="362" class="sm" fill="#f4b740">no</text>
  <path d="M772 358 L730 379 L180 379 L129 346" class="loop" marker-end="url(#aw)"/>
  <text x="400" y="372" class="ll">improve &amp; resubmit — updates the same item (dedup · lock)</text>

  <text x="1000" y="296" class="sm">standalone “Add evidence”</text>
  <text x="1000" y="311" class="sm">reuses this exact path</text>
  <text x="1000" y="326" class="sm">(confirm-before-store)</text>

  <line x1="962" y1="344" x2="1136" y2="344" class="flow" marker-end="url(#a)"/>
  <circle cx="1160" cy="344" r="14" fill="#0f1a30" stroke="#cbb0ff" stroke-width="1.5"/>
  <text x="1160" y="349" text-anchor="middle" class="nl" fill="#cbb0ff">3</text>

  <!-- ============ Lane 3: Review ============ -->
  <rect x="28" y="402" width="1184" height="128" rx="12" class="band"/>
  <text x="44" y="426" class="lane" fill="#cbb0ff">3 · Grounded review &amp; export</text>

  <rect x="44" y="450" width="150" height="52" rx="26" class="human"/>
  <text x="119" y="472" text-anchor="middle" class="nl">Manager opens</text>
  <text x="119" y="488" text-anchor="middle" class="sm">results · evidence on file</text>

  <rect x="224" y="450" width="180" height="52" rx="9" class="det"/>
  <text x="314" y="472" text-anchor="middle" class="nl">privacy_node</text>
  <text x="314" y="488" text-anchor="middle" class="sm">consent-gated · minimized</text>

  <rect x="434" y="450" width="170" height="52" rx="9" fill="#1a1730" stroke="#b98bff" stroke-width="1.5"/>
  <text x="519" y="472" text-anchor="middle" class="nl">review_draft_agent</text>
  <text x="519" y="488" text-anchor="middle" class="sm">cites evidence ids · role matrix</text>

  <rect x="634" y="450" width="150" height="52" rx="9" class="det"/>
  <text x="709" y="472" text-anchor="middle" class="nl">fairness_node</text>
  <text x="709" y="488" text-anchor="middle" class="sm">grounding · vague · recency</text>

  <polygon points="804,476 860,448 916,476 860,504" class="dia"/>
  <text x="860" y="480" text-anchor="middle" class="nl" font-size="11.5">approve?</text>

  <rect x="948" y="450" width="180" height="52" rx="9" class="ok"/>
  <text x="1038" y="472" text-anchor="middle" class="nl">Export Markdown</text>
  <text x="1038" y="488" text-anchor="middle" class="sm">+ audit log entry</text>

  <line x1="194" y1="476" x2="222" y2="476" class="flow" marker-end="url(#a)"/>
  <line x1="404" y1="476" x2="432" y2="476" class="flow" marker-end="url(#a)"/>
  <line x1="604" y1="476" x2="632" y2="476" class="flow" marker-end="url(#a)"/>
  <line x1="784" y1="476" x2="802" y2="476" class="flow" marker-end="url(#a)"/>
  <line x1="916" y1="476" x2="946" y2="476" class="flow" marker-end="url(#a)"/>
  <text x="924" y="468" class="sm" fill="#7ee0b8">approve</text>
  <path d="M860 448 L860 432 L519 432 L519 446" class="loop" marker-end="url(#aw)"/>
  <text x="640" y="428" class="ll">edit — redraft</text>

  <!-- legend -->
  <rect x="44" y="556" width="26" height="14" rx="7" class="human"/><text x="78" y="567" class="sm">human step / control point</text>
  <rect x="240" y="556" width="26" height="14" rx="4" class="agent"/><text x="274" y="567" class="sm">LLM agent</text>
  <rect x="360" y="556" width="26" height="14" rx="4" class="det"/><text x="394" y="567" class="sm">deterministic node</text>
  <rect x="516" y="556" width="26" height="14" rx="4" class="ok"/><text x="550" y="567" class="sm">outcome</text>
  <line x1="626" y1="563" x2="668" y2="563" class="loop"/><text x="676" y="567" class="sm">refine / quality loop</text>
  <text x="44" y="600" class="sm">Phase 1 ends at manager approval; phase 2 routes by validator confidence; phase 3 requires approval before export. Nothing is sent, stored as strong, or exported without a human decision.</text>
</svg>
