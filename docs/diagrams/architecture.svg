<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 630" role="img" aria-labelledby="t d" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <title id="t">ReviewOps Agent — system architecture</title>
  <desc id="d">A TypeScript Next.js frontend on Vercel enforces auth, RBAC and PII redaction before calling a stateless Python ADK 2.0 agent on Cloud Run (Gemini via Vertex) over REST; app data lives in Turso. Access control runs before the model.</desc>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#8aa0c4"/></marker>
    <style>
      .t{fill:#f2f6fc;font-weight:800;font-size:30px}
      .sub{fill:#9fb0cc;font-size:15px}
      .box{fill:#16223c;stroke:#2c3e60;stroke-width:1.5}
      .lab{fill:#e7eef9;font-weight:600;font-size:13.5px}
      .hdr{fill:#f2f6fc;font-weight:700;font-size:16px}
      .sm{fill:#9fb0cc;font-size:11px}
      .sm2{fill:#c3d1ea;font-size:11.5px}
      .pill{fill:#0f1a30;stroke:#2c3e60;stroke-width:1}
      .albl{fill:#8aa0c4;font-size:11px}
    </style>
  </defs>

  <rect width="1120" height="630" fill="#0b1220"/>
  <text x="40" y="52" class="t">ReviewOps Agent</text>
  <text x="40" y="80" class="sub">Permission-aware, evidence-grounded performance reviews — access control runs <tspan fill="#f4b740" font-weight="700">before</tspan> the model.</text>

  <!-- A: Browser -->
  <rect x="40" y="200" width="180" height="150" rx="12" class="box"/>
  <text x="130" y="232" text-anchor="middle" class="hdr">Browser</text>
  <text x="130" y="262" text-anchor="middle" class="sm2">Manager dashboard</text>
  <text x="130" y="286" text-anchor="middle" class="sm2">Employee survey link</text>
  <text x="130" y="322" text-anchor="middle" class="sm">(mock SSO · token links)</text>

  <!-- A -> B -->
  <line x1="220" y1="275" x2="298" y2="275" stroke="#8aa0c4" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="259" y="266" text-anchor="middle" class="albl">HTTPS</text>

  <!-- B: Next.js / Vercel  (security boundary) -->
  <rect x="300" y="150" width="330" height="330" rx="16" fill="#0f1a30" stroke="#f4b740" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="465" y="184" text-anchor="middle" class="hdr" fill="#f6d488">Next.js on Vercel</text>
  <text x="465" y="206" text-anchor="middle" font-size="11.5" fill="#e0b45f">🔒 security boundary — before any model call</text>
  <rect x="322" y="226" width="286" height="48" rx="10" class="box"/>
  <text x="465" y="255" text-anchor="middle" class="lab">Auth · RBAC · permissions</text>
  <rect x="322" y="286" width="286" height="48" rx="10" class="box"/>
  <text x="465" y="315" text-anchor="middle" class="lab">Services: survey · evidence · review</text>
  <rect x="322" y="346" width="286" height="48" rx="10" class="box"/>
  <text x="465" y="368" text-anchor="middle" class="lab">Privacy filter</text>
  <text x="465" y="384" text-anchor="middle" class="sm">PII redaction · data minimization</text>
  <rect x="322" y="406" width="286" height="44" rx="10" class="box"/>
  <text x="465" y="433" text-anchor="middle" class="lab">SQLite / Turso (Drizzle ORM)</text>

  <!-- B -> C -->
  <line x1="630" y1="300" x2="708" y2="300" stroke="#8aa0c4" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="669" y="290" text-anchor="middle" class="albl">REST</text>
  <text x="669" y="318" text-anchor="middle" class="albl">authorized · PII-safe</text>

  <!-- C: Python ADK / Cloud Run -->
  <rect x="710" y="150" width="370" height="235" rx="16" fill="#0f1a30" stroke="#5b9bff" stroke-width="2"/>
  <text x="895" y="184" text-anchor="middle" class="hdr" fill="#bcd3ff">Python ADK 2.0 · Cloud Run</text>
  <text x="895" y="206" text-anchor="middle" font-size="11.5" fill="#8fb0e6">Vertex mode · X-Agent-Key · rate-limited</text>
  <rect x="732" y="226" width="326" height="62" rx="10" class="box"/>
  <text x="895" y="250" text-anchor="middle" class="lab">3 graph Workflows</text>
  <text x="895" y="272" text-anchor="middle" class="sm">questionnaire→safety · evidence (gated) · review→fairness</text>
  <rect x="732" y="300" width="326" height="48" rx="10" fill="#1a1730" stroke="#b98bff" stroke-width="1.5"/>
  <text x="895" y="329" text-anchor="middle" class="lab" fill="#e6d9ff">Gemini 2.5 Flash · Vertex AI</text>
  <text x="895" y="372" text-anchor="middle" class="sm">SkillToolset · OpenTelemetry spans</text>

  <!-- cross-cutting footer -->
  <rect x="40" y="520" width="330" height="40" rx="20" class="pill"/>
  <text x="205" y="545" text-anchor="middle" class="lab">Human-in-the-loop approval</text>
  <rect x="395" y="520" width="330" height="40" rx="20" class="pill"/>
  <text x="560" y="545" text-anchor="middle" class="lab">OpenTelemetry → Cloud Trace</text>
  <rect x="750" y="520" width="330" height="40" rx="20" class="pill"/>
  <text x="915" y="545" text-anchor="middle" class="lab">Audit log (incl. denied access)</text>

  <text x="40" y="600" class="sm">The LLM is never the authorization boundary — RBAC, consent and PII minimization happen in the TS app before the REST call.</text>
</svg>
