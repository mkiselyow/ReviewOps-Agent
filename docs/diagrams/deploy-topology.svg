<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-labelledby="t d" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <title id="t">ReviewOps Agent — deployment topology</title>
  <desc id="d">Browser to Next.js on Vercel (Hobby) to a stateless Python agent on Cloud Run (Vertex mode, no API key in image) to Gemini via Vertex AI; Vercel talks to Turso libSQL over HTTPS. Secrets live in env only.</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#8aa0c4"/></marker>
    <style>
      .t{fill:#f2f6fc;font-weight:800;font-size:24px}
      .sub{fill:#9fb0cc;font-size:14px}
      .nl{fill:#f2f6fc;font-weight:700;font-size:15px}
      .sm{fill:#9fb0cc;font-size:11px}
      .albl{fill:#8aa0c4;font-size:11px}
    </style>
  </defs>
  <rect width="1000" height="420" fill="#0b1220"/>
  <text x="40" y="46" class="t">Deployment topology</text>
  <text x="40" y="72" class="sub">Live: <tspan fill="#8fb6ff">reviewops-agent.vercel.app</tspan> — the browser never calls the agent directly.</text>

  <rect x="40" y="150" width="150" height="80" rx="12" fill="#16223c" stroke="#2c3e60" stroke-width="1.5"/>
  <text x="115" y="185" text-anchor="middle" class="nl">Browser</text><text x="115" y="206" text-anchor="middle" class="sm">manager · employee</text>

  <rect x="255" y="150" width="190" height="80" rx="12" fill="#16223c" stroke="#5b9bff" stroke-width="1.8"/>
  <text x="350" y="182" text-anchor="middle" class="nl">Next.js · Vercel</text><text x="350" y="203" text-anchor="middle" class="sm">Hobby · serverless (60s)</text>

  <rect x="510" y="150" width="190" height="80" rx="12" fill="#16223c" stroke="#5b9bff" stroke-width="1.8"/>
  <text x="605" y="178" text-anchor="middle" class="nl">Python agent</text><text x="605" y="197" text-anchor="middle" class="sm">Cloud Run · Vertex mode</text><text x="605" y="214" text-anchor="middle" class="sm">no API key in image · 600s</text>

  <rect x="765" y="150" width="195" height="80" rx="12" fill="#1a1730" stroke="#b98bff" stroke-width="1.8"/>
  <text x="862" y="185" text-anchor="middle" class="nl" fill="#e6d9ff">Vertex AI</text><text x="862" y="206" text-anchor="middle" class="sm">Gemini 2.5 Flash</text>

  <rect x="255" y="300" width="190" height="66" rx="12" fill="#12233d" stroke="#34d399" stroke-width="1.8"/>
  <text x="350" y="330" text-anchor="middle" class="nl" fill="#c9f5e4">Turso / libSQL</text><text x="350" y="349" text-anchor="middle" class="sm">app data (Drizzle)</text>

  <line x1="190" y1="190" x2="253" y2="190" stroke="#8aa0c4" stroke-width="1.6" marker-end="url(#a)"/><text x="221" y="181" text-anchor="middle" class="albl">HTTPS</text>
  <line x1="445" y1="190" x2="508" y2="190" stroke="#8aa0c4" stroke-width="1.6" marker-end="url(#a)"/><text x="476" y="178" text-anchor="middle" class="albl">REST</text><text x="476" y="205" text-anchor="middle" class="albl">X-Agent-Key</text>
  <line x1="700" y1="190" x2="763" y2="190" stroke="#8aa0c4" stroke-width="1.6" marker-end="url(#a)"/><text x="731" y="181" text-anchor="middle" class="albl">ADC (no key)</text>
  <line x1="350" y1="230" x2="350" y2="298" stroke="#8aa0c4" stroke-width="1.6" marker-end="url(#a)"/><text x="392" y="270" text-anchor="middle" class="albl">libSQL</text>

  <text x="40" y="400" class="sm">Secrets live in env vars only (Vercel + Cloud Run runtime SA) — never in the image or the repo · Cloud Run scales to zero.</text>
</svg>
